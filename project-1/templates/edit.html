{% extends "base.html" %}
{% block content %}
<h3>Edit Record</h3>
<form method="POST">
    <input type="text" name="content" class="form-control mb-2" value="{{ record.content }}">
    <button type="submit" class="btn btn-success">Update</button>
    <a href="/dashboard" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}

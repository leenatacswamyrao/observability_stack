{% extends "base.html" %}
{% block content %}
<h2>Welcome, {{ session.user_name }}</h2>

<div class="card p-4 mb-4 shadow-sm">
    <form action="/add" method="POST" class="d-flex">
        <input type="text" name="content" class="form-control me-2" placeholder="Enter record data..." required>
        <button type="submit" class="btn btn-primary">Create</button>
    </form>
</div>

<h3>Current Records</h3>
<ul class="list-group">
    {% for r in records %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
        <span>{{ r.content }}</span>
        <div class="btn-group">
            <a href="/edit/{{ r.id }}" class="btn btn-warning btn-sm">Edit</a>
            <a href="/delete/{{ r.id }}" class="btn btn-danger btn-sm">Delete</a>
        </div>
    </li>
    {% else %}
    <li class="list-group-item text-muted">No records yet.</li>
    {% endfor %}
</ul>
{% endblock %}

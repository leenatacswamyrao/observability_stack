environment:
  name: Production
  identifier: production
  description: "Production environment for observability demo"
  tags:
    env: production
    observability: enabled
  
  type: Production
  
  # Environment-level variables
  variables:
    - name: cluster_name
      type: String
      value: production-cluster
      description: "Kubernetes cluster name"
    
    - name: observability_enabled
      type: String
      value: "true"
      description: "Enable observability features"
    
    - name: chaos_testing_enabled
      type: String
      value: "true"
      description: "Enable chaos engineering"
  
  # Override configurations
  overrides:
    manifests:
      - manifest:
          identifier: environment_overrides
          type: Values
          spec:
            store:
              type: Git
              spec:
                connectorRef: <YOUR_GIT_CONNECTOR>
                gitFetchType: Branch
                branch: main
                paths:
                  - config/production-values.yaml

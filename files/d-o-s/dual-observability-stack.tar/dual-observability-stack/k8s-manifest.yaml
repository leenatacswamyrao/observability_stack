---
# ==============================================================================
# UNIFIED KUBERNETES DEPLOYMENT - DUAL OBSERVABILITY STACK SUPPORT
# ==============================================================================
# 
# USAGE:
# 1. For OpenTelemetry + Prometheus + Grafana stack:
#    - Keep "STACK A" sections uncommented
#    - Comment out all "STACK B (Dynatrace)" sections
#    - Set OBSERVABILITY_STACK=otel-prometheus in app deployment
#
# 2. For Dynatrace stack:
#    - Keep "STACK B" sections uncommented  
#    - Comment out all "STACK A" sections
#    - Set OBSERVABILITY_STACK=dynatrace in app deployment
#    - Update DYNATRACE_ENDPOINT and DYNATRACE_TOKEN in ConfigMap
#
# ==============================================================================

# ------------------------------------------------------------------------------
# NAMESPACE
# ------------------------------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: observability-demo
  labels:
    app: observability-demo

---
# ------------------------------------------------------------------------------
# CONFIGMAP - Environment Configuration
# ------------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: observability-demo
data:
  # Switch between 'otel-prometheus' or 'dynatrace'
  OBSERVABILITY_STACK: "otel-prometheus"  # CHANGE THIS TO SWITCH STACKS
  
  SERVICE_NAME: "python-app"
  ENVIRONMENT: "production"
  PORT: "8080"
  
  # Stack A: OpenTelemetry Collector endpoint
  OTEL_ENDPOINT: "http://otel-collector:4317"
  
  # Stack B: Dynatrace configuration (uncomment and populate when using Dynatrace)
  # DYNATRACE_ENDPOINT: "https://YOUR_ENV.live.dynatrace.com/api/v2/otlp"
  # DYNATRACE_TOKEN: "YOUR_API_TOKEN"

---
# ------------------------------------------------------------------------------
# SECRET - Sensitive Configuration (Dynatrace)
# ------------------------------------------------------------------------------
# Uncomment when using Dynatrace
# apiVersion: v1
# kind: Secret
# metadata:
#   name: dynatrace-secret
#   namespace: observability-demo
# type: Opaque
# stringData:
#   token: "YOUR_DYNATRACE_API_TOKEN"

---
# ==============================================================================
# APPLICATION DEPLOYMENT
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app
  namespace: observability-demo
  labels:
    app: python-app
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: python-app
  template:
    metadata:
      labels:
        app: python-app
        version: v1
      annotations:
        prometheus.io/scrape: "true"  # For Stack A
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: python-app
        image: <+artifact.image>  # Harness artifact placeholder
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: OBSERVABILITY_STACK
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: OBSERVABILITY_STACK
        - name: SERVICE_NAME
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: SERVICE_NAME
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: ENVIRONMENT
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: PORT
        - name: OTEL_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: OTEL_ENDPOINT
        # Uncomment for Dynatrace
        # - name: DYNATRACE_ENDPOINT
        #   valueFrom:
        #     configMapKeyRef:
        #       name: app-config
        #       key: DYNATRACE_ENDPOINT
        # - name: DYNATRACE_TOKEN
        #   valueFrom:
        #     secretKeyRef:
        #       name: dynatrace-secret
        #       key: token
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: python-app
  namespace: observability-demo
  labels:
    app: python-app
spec:
  type: ClusterIP
  selector:
    app: python-app
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http

---
# Ingress for browser access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: python-app-ingress
  namespace: observability-demo
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: python-app.local  # Update with your domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: python-app
            port:
              number: 8080

---
# ==============================================================================
# STACK A: OPENTELEMETRY + PROMETHEUS + GRAFANA
# ==============================================================================
# Comment out this entire section when using Dynatrace
# ------------------------------------------------------------------------------

# ------------------------------------------------------------------------------
# OpenTelemetry Collector
# ------------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observability-demo
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    
    processors:
      batch:
        timeout: 10s
        send_batch_size: 1024
      
      memory_limiter:
        check_interval: 1s
        limit_mib: 512
    
    exporters:
      # Export to Prometheus (scrape endpoint)
      prometheus:
        endpoint: "0.0.0.0:8889"
      
      # Export traces to Tempo/Jaeger
      otlp/tempo:
        endpoint: tempo:4317
        tls:
          insecure: true
      
      # Logging for debugging
      logging:
        loglevel: info
    
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/tempo, logging]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [prometheus, logging]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: observability-demo
  labels:
    app: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:0.91.0
        args:
        - --config=/conf/otel-collector-config.yaml
        ports:
        - containerPort: 4317  # OTLP gRPC
        - containerPort: 4318  # OTLP HTTP
        - containerPort: 8889  # Prometheus metrics
        volumeMounts:
        - name: config
          mountPath: /conf
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: config
        configMap:
          name: otel-collector-config

---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: observability-demo
  labels:
    app: otel-collector
spec:
  type: ClusterIP
  selector:
    app: otel-collector
  ports:
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
    protocol: TCP
  - name: otlp-http
    port: 4318
    targetPort: 4318
    protocol: TCP
  - name: prometheus
    port: 8889
    targetPort: 8889
    protocol: TCP

---
# ------------------------------------------------------------------------------
# Prometheus
# ------------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: observability-demo
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    
    scrape_configs:
      # Scrape Python app metrics
      - job_name: 'python-app'
        kubernetes_sd_configs:
        - role: pod
          namespaces:
            names:
            - observability-demo
        relabel_configs:
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
          action: keep
          regex: true
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
          action: replace
          regex: ([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
          target_label: __address__
      
      # Scrape OTel Collector metrics
      - job_name: 'otel-collector'
        static_configs:
        - targets: ['otel-collector:8889']

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: observability-demo
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:v2.48.0
        args:
        - '--config.file=/etc/prometheus/prometheus.yml'
        - '--storage.tsdb.path=/prometheus'
        - '--web.console.libraries=/usr/share/prometheus/console_libraries'
        - '--web.console.templates=/usr/share/prometheus/consoles'
        - '--web.enable-lifecycle'
        ports:
        - containerPort: 9090
          name: http
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: storage
          mountPath: /prometheus
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: storage
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: observability-demo
  labels:
    app: prometheus
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: http

---
# ------------------------------------------------------------------------------
# Tempo (for distributed tracing)
# ------------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: observability-demo
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
    
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
    
    storage:
      trace:
        backend: local
        local:
          path: /tmp/tempo/traces

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: observability-demo
  labels:
    app: tempo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
    spec:
      containers:
      - name: tempo
        image: grafana/tempo:2.3.0
        args:
        - -config.file=/etc/tempo/tempo.yaml
        ports:
        - containerPort: 3200  # HTTP
        - containerPort: 4317  # OTLP gRPC
        volumeMounts:
        - name: config
          mountPath: /etc/tempo
        - name: storage
          mountPath: /tmp/tempo
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: config
        configMap:
          name: tempo-config
      - name: storage
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: observability-demo
  labels:
    app: tempo
spec:
  type: ClusterIP
  selector:
    app: tempo
  ports:
  - name: http
    port: 3200
    targetPort: 3200
    protocol: TCP
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
    protocol: TCP

---
# ------------------------------------------------------------------------------
# Grafana
# ------------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability-demo
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      access: proxy
      url: http://prometheus:9090
      isDefault: true
      editable: true
    - name: Tempo
      type: tempo
      access: proxy
      url: http://tempo:3200
      editable: true

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: observability-demo
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:10.2.0
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"  # Change in production
        - name: GF_INSTALL_PLUGINS
          value: "grafana-piechart-panel"
        volumeMounts:
        - name: datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: storage
          mountPath: /var/lib/grafana
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: datasources
        configMap:
          name: grafana-datasources
      - name: storage
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: observability-demo
  labels:
    app: grafana
spec:
  type: LoadBalancer  # or NodePort for on-prem
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http

---
# Ingress for Grafana
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: observability-demo
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: grafana.local  # Update with your domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000

---
# ==============================================================================
# STACK B: DYNATRACE ONLY
# ==============================================================================

---
# ==============================================================================
# RBAC for Chaos Experiments
# ==============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chaos-controller
  namespace: observability-demo

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chaos-controller-role
  namespace: observability-demo
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "delete"]
- apiGroups: ["chaos-mesh.org"]
  resources: ["*"]
  verbs: ["*"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chaos-controller-binding
  namespace: observability-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: chaos-controller-role
subjects:
- kind: ServiceAccount
  name: chaos-controller
  namespace: observability-demo

---
# ==============================================================================
# CHAOS ENGINEERING - CHAOS MESH EXPERIMENTS
# ==============================================================================
# These work with both observability stacks
# ------------------------------------------------------------------------------

# Network chaos - inject latency
---
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: network-delay
  namespace: observability-demo
  annotations:
    harness.io/chaos-experiment: "network-latency"
spec:
  action: delay
  mode: one
  selector:
    namespaces:
    - observability-demo
    labelSelectors:
      app: python-app
  delay:
    latency: "100ms"
    correlation: "100"
    jitter: "10ms"
  duration: "2m"
  scheduler:
    cron: "@every 10m"  # Run every 10 minutes

---
# Pod failure chaos
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: pod-failure
  namespace: observability-demo
  annotations:
    harness.io/chaos-experiment: "pod-kill"
spec:
  action: pod-kill
  mode: one
  selector:
    namespaces:
    - observability-demo
    labelSelectors:
      app: python-app
  duration: "30s"
  scheduler:
    cron: "@every 15m"

---
# CPU stress chaos
apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: cpu-stress
  namespace: observability-demo
  annotations:
    harness.io/chaos-experiment: "cpu-stress"
spec:
  mode: one
  selector:
    namespaces:
    - observability-demo
    labelSelectors:
      app: python-app
  stressors:
    cpu:
      workers: 2
      load: 80
  duration: "3m"
  scheduler:
    cron: "@every 20m"

---
# ==============================================================================
# SERVICE MESH INTEGRATION (Optional - for advanced scenarios)
# ==============================================================================
